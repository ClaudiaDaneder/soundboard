<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Soundboard 🔊</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: sans-serif;
      background: #111;
      color: #fff;
      padding: 24px;
    }

    h1 {
      text-align: center;
      margin-bottom: 24px;
      font-size: 1.6rem;
      letter-spacing: 1px;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
      gap: 14px;
      max-width: 900px;
      margin: 0 auto;
    }

    .sound-btn {
      background: #222;
      border: 2px solid #444;
      border-radius: 12px;
      padding: 18px 12px;
      cursor: pointer;
      text-align: center;
      transition: background 0.15s, transform 0.1s, border-color 0.15s;
      user-select: none;
      color: #fff;
    }

    .sound-btn:hover { background: #333; border-color: #888; }

    .sound-btn.playing {
      background: #1db954;
      border-color: #1db954;
      transform: scale(0.96);
      color: #000;
    }

    .sound-btn .emoji { font-size: 2rem; display: block; margin-bottom: 8px; }
    .sound-btn .label { font-size: 0.85rem; font-weight: 600; }

    #status {
      text-align: center;
      margin-top: 40px;
      color: #666;
      font-size: 0.85rem;
    }
  </style>
</head>
<body>

<h1>🔊 Soundboard</h1>
<div class="grid" id="grid"></div>
<p id="status">Sounds werden geladen…</p>

<script>
  async function init() {
    let sounds;
    try {
      const res = await fetch("sounds.json");
      if (!res.ok) throw new Error("sounds.json nicht gefunden");
      sounds = await res.json();
    } catch (e) {
      document.getElementById("status").textContent = "⚠️ sounds.json nicht gefunden.";
      return;
    }

    const grid = document.getElementById("grid");
    document.getElementById("status").textContent = "";

    sounds.forEach(s => {
      // Dateiname ohne Endung als Titel, falls kein label angegeben
      const label = s.title || s.file.replace(/\.[^.]+$/, "");
      const emoji = s.emoji || "🔊";
      const url   = "sounds/" + s.file;

      const btn = document.createElement("button");
      btn.className = "sound-btn";
      btn.innerHTML = `<span class="emoji">${emoji}</span><span class="label">${label}</span>`;
      btn.onclick = () => {
        const audio = new Audio(url);
        btn.classList.add("playing");
        audio.play().catch(e => alert("Fehler: " + e.message));
        audio.onended = () => btn.classList.remove("playing");
      };
      grid.appendChild(btn);
    });
  }

  init();
</script>
</body>
</html>
